<!DOCTYPE html>

<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<title>任務回報模板產生器</title>
<style>
        /* ====== 基本頁面樣式 ====== */
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background-color: #ffffff;
            border-radius: 12px;
            padding: 20px 24px 32px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }

        h1 {
            text-align: center;
            margin: 0 0 1.2rem 0;
            font-size: 1.6rem;
        }

        h2 {
            font-size: 1.1rem;
            border-left: 4px solid #4a90e2;
            padding-left: 8px;
            margin: 1.5rem 0 .8rem 0;
        }

        .section,
        .title-section {
            background-color: #fafafa;
            padding: 12px 14px 16px;
            border-radius: 8px;
            margin-bottom: 1.5rem;
        }

        /* ====== 表單列 ====== */
        .form-row {
            display: flex;
            align-items: center;
            margin-bottom: 0.7rem;
            gap: 8px;
        }

        .form-row.vertical {
            flex-direction: column;
            align-items: flex-start;
        }

        .form-row label {
            min-width: 120px;
            font-weight: 500;
        }

        
        /* 讓裝置區塊在 form-row 中撐滿剩餘寬度（Android 瀏覽器版本可延伸至最右側） */
        .device-group {
            flex: 1;
            min-width: 0; /* 避免 flex 子項被內容撐爆 */
            max-width: 696px; /* 比照 iOS 其他區塊的實際右緣（120+260+300+gap*2） */ /* 與 iOS 其他區塊的寬度一致，避免過寬 */
        }
        .device-group .device-row {
            width: 100%;
        }
/* ====== 基本 input 樣式 ====== */
        input[type="text"],
        input[type="date"],
        select,
        textarea {
            font-size: 0.95rem;
            padding: 6px 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        /* ====== menu-only inputs（僅選單，不允許鍵盤輸入） ====== */
        .menu-only{
            caret-color: transparent;
            cursor: pointer;
        }
        .menu-only::selection{ background: transparent; }


        textarea {
            width: 100%;
            resize: vertical;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", "Noto Sans TC", sans-serif;
            font-variant-east-asian: proportional-width;
        }

        /* ====== 富文字編輯器 ====== */
        .rich-editor {
            width: 100%;
            border-radius: 6px;
            border: 1px solid #ccc;
            padding: 6px 8px;
            background-color: #fff;
            overflow-y: auto;
            font-size: .95rem;
        }
        .rich-editor.large { min-height: 140px; }
        .rich-editor.medium { min-height: 80px; }

        /* ====== autocomplete wrapper ====== */
        .autocomplete-wrapper {
            position: relative;
            flex: 1;
        }

        .suggestions {
            position: absolute;
            top: 100%;
            left: 0; right: 0;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.08);
            max-height: 200px;
            overflow-y: auto;
            display: none;
            z-index: 50;
        }

        .suggestion-item {
            padding: 6px 8px;
            cursor: pointer;
        }
        .suggestion-item:hover {
            background-color: #e6f2ff;
        }

        #title-preview {
            width: 100%;
            padding: 6px 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
            margin-bottom: 10px;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", "Noto Sans TC", sans-serif;
            font-variant-east-asian: proportional-width;
        }

        #full-preview {
            width: 100%;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", "Noto Sans TC", sans-serif;
            font-variant-east-asian: proportional-width;
            background-color: #fdfdfd;
        }

        /* ====== 裝置欄位（保持原樣） ====== */
        .device-row {
            display: grid;
            grid-template-columns: 120px 300px 300px;
            align-items: center;
            gap: 8px;
        }

        #pc-row {
            grid-template-columns: 120px 300px;
        }

        #ios-row {
            grid-template-columns: 120px 300px;
        }

        /* ====== ⭐ iOS 子選項（正式修改版） ====== */

        /* Safari / Chrome / 其他整組左移，與你圖片一致 */
        #ios-browser-wrapper {
            margin-left: 80px;   /* 你測試後確定的值 */
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        /* Safari / Chrome — 左 120px（checkbox + label）、右側 260px（輸入欄位） */
        .ios-browser-group .device-row {
            display: grid;
            grid-template-columns: 120px 260px; /* 你手動試出的完美比例 */
            gap: 8px;
        }

        /* ====== 其他（Other）三欄，只調整這行，不影響 Safari/Chrome ====== */
        .ios-extra-row {
            display: grid;
            grid-template-columns: 120px 260px 220px; /* 完全對齊 Safari/Chrome + Android */
            gap: 8px;
        }

        /* “瀏覽器（例：Edge）” 欄位 → 和 Safari/Chrome 一樣寬 */
        #ios-other-name {
            width: 260px;       /* ❗ 不加 !important 才不會干到其他欄位 */
        }

        /* “例：121.0” 欄位 → 位置後退，寬度固定 300px */
        #ios-other-version {
            width: 300px;       /* ❗ 精準對齊 Android 的瀏覽器欄位 */
        }

        /* === 覆寫按鈕 UI（依照你的圖片樣式）=== */
        .button-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 20px 0;
            flex-wrap: wrap;
            align-items: center;
        }

        .button-row button {
            padding: 10px 26px;
            border-radius: 999px;
            border: none;
            background-color: #4a90e2;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s ease-in-out;
        }

        .button-row button:disabled {
            background-color: #b0b0b0;
            border-color: #b0b0b0;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .button-row button:hover {
            background-color: #357bd8;
        }

        .button-row button:active {
            transform: scale(0.96);
        }

        #problem-desc {
            width: 735px !important;
        }        

        

        #title-serial {
            width: 160px;
        }
#bug_def {
            width: 644px !important;
        }


                /* ====== BUG 等級（任務標題區塊） ====== */
        .bug-level-layout{
            display: flex;
            flex-direction: column;   /* 表格放在下方，並吃滿整行寬度 */
            align-items: stretch;
            gap: 6px;                 /* 行距更緊密 */
            margin-top: 4px;
        }
        .bug-level-left{
            flex: 0 0 auto;
            min-width: 0;
        }
        .bug-level-left .form-row{
            margin-bottom: 0;
        }
        #bug-level{
            width: 160px;
        }
        .bug-level-table-wrap{
            width: 100%;
            max-width: 100%;
            overflow: hidden; /* 固定表格大小 + 禁止任何卷軸 */         /* 若螢幕太窄，改為水平捲動避免怪換行 */
        }
        .bug-level-table{
            width: 100%;
            table-layout: fixed;      /* 固定總寬：欄位在固定寬內分配 */
            min-width: 0;             /* 不允許撐大表格 */
            border-collapse: collapse;
            font-size: 0.86rem;
            background: #fff;
            border: 1px solid #e1e1e1;
            border-radius: 8px;
            overflow: hidden;
        }
        .bug-level-table th,
        .bug-level-table td{
            border: 1px solid #e1e1e1;
            padding: 6px 8px;
            vertical-align: top;
            line-height: 1.25;
            font-weight: 400;
            text-align: left;

            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .bug-level-table th{
            background: linear-gradient(180deg, #e8f0fa 0%, #dbe6f4 100%);
            color: #2f3b4a;
            border-bottom: 1px solid #cdd7e3;
            font-weight: 700;
            text-align: center;
            white-space: nowrap;
        }
        .bug-level-table td.bug-level{
            width: 52px;
            text-align: center;
            font-weight: 700;
            white-space: nowrap;
            vertical-align: middle;
        }
        /* ====== 已選遊戲（橫向 chip 樣式） ====== */
        #selected-games {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }



        /* ====== 遊戲搜尋欄位：寬度跟著文字（避免 placeholder 被截斷，也不留多餘空白） ====== */
        #game-select{
            display: inline-block;
            width: auto;        /* 實際寬度由 JS 量測後設定 */
            max-width: 100%;
        }

        /* ====== 已選站別（chip 顯示在選擇欄位右側） ====== */
        .site-inline-select{
            display: flex;
            align-items: flex-start;
            gap: 8px;
            flex: 1;
            min-width: 0;
        }
        .site-select-wrap{
            width: 220px;
            flex: 0 0 auto;
            position: relative;
        }
        .site-select-wrap input{ width: 100%; }
        #selected-sites{
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            min-height: 28px;
            align-content: flex-start;
            margin-top: 0px;
            flex: 1;
            min-width: 0;
        }

        /* === 站別與站別設定區塊之間更緊密 === */
        .form-row:has(.site-inline-select){
            margin-bottom: 0.35rem;
        }
        .form-row:has(#site-config-container){
            margin-top: 0px;
        }


        .game-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 999px;
            background: #e6f2ff;
            color: #1f4fa3;
            font-size: 0.85rem;
        }
        .game-chip button {
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 0.9rem;
            line-height: 1;
            color: #1f4fa3;
        }
        .game-chip button:hover {
            color: #c00;
        }




        /* ====== 站別設定區塊（與 chip 樣式做區隔） ====== */
        .site-config-container{ margin-top: 2px; width: 100%; }

        .site-config-card{
            background: #ffffff;
            border: 1px solid #e6e6e6;
            border-radius: 10px;
            padding: 8px 12px;
            margin: 6px 0 8px;
        }

        .site-config-header{
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }

        /* 站別標題：用「小標籤/章節」風格，避免和 chip（藍色膠囊）長得一樣 */
        .site-config-title{
            font-weight: 700;
            font-size: 0.92rem;
            color: #2b2b2b;
            background: #f3f3f3;
            border: 1px solid #e3e3e3;
            border-left: 4px solid #4a90e2;
            padding: 4px 10px;
            border-radius: 8px;
            line-height: 1.1;
        }

        .site-config-row{
            display: flex;
            align-items: flex-start;
            gap: 6px;
            margin-top: 0px;
        }
        .site-config-row label{
            min-width: 120px;
            font-weight: 500;
            padding-top: 6px;
        }

        .site-config-row .autocomplete-wrapper{ flex: 1; min-width: 0; }

        .site-config-row .field{ flex: 1; min-width: 0; }

        /* 站別/廳主/帳號的多選 chip 容器：預留一行高度，避免推擠 */
        .selected-chips{
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            /* 預留兩行 chip 高度：避免加入後推擠膠囊；超出則在區塊內捲動 */
            min-height:  28px;
            max-height: 52px;
            overflow-y: auto;
            align-content: flex-start;
        }

        /* 讓卡片內各區塊更緊密：覆寫 JS 內聯 marginTop=2px（避免 chip 區塊與上一行留白過多） */
        .site-config-card .selected-chips{ margin-top: 1px !important; }

        /* 每站別：廳主/帳號一對一綁定 UI */
        .pair-add-line{
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .pair-add-line .pair-hall-wrap{ width: 260px; flex: 0 0 auto; }
        .pair-add-line .pair-account-wrap{ width: 240px; flex: 0 0 auto; }
        /* 試玩模式：保留帳號欄寬度以對齊版面，但不顯示內容 */
        .trial-empty{
            visibility: hidden;
            pointer-events: none;
        }
        .pair-add-line button{
            padding: 6px 10px;
            border-radius: 8px;
            border: 1px solid #cfd8e3;
            background: #f7f9fc;
            cursor: pointer;
        }
        .pair-add-line button:hover{ background:#eef3fb; }

        /* 讓所有「加入」按鈕一致（含試玩模式的加入） */
        .pair-add-btn{
            padding: 6px 10px;
            border-radius: 8px;
            border: 1px solid #cfd8e3;
            background: #f7f9fc;
            cursor: pointer;
        }
        .pair-add-btn:hover{ background:#eef3fb; }

        /* 每站別：版本（遊戲版本 / 投注歷程版本） */
        /* 目標：勾選後出現輸入框時不推擠膠囊高度 → 先預留輸入框高度 */
        .site-version-block{
            margin-top: 2px; /* 更緊密 */
            display: flex;
            flex-direction: column;
            gap: 2px; /* 更緊密 */
        }
        .site-version-line{
            /* 讓兩個輸入框起點完全對齊：固定第一欄寬度 */
            display: grid;
            grid-template-columns: 150px 300px;
            align-items: center;
            column-gap: 10px;
        }
        .site-version-line label{
            width: 150px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            margin: 0;
            white-space: nowrap;
        }
        .site-version-line .autocomplete-wrapper{
            width: 300px;
            flex: 0 0 auto;
            min-width: 0;
            display: block; /* 永遠保留佔位，避免勾選後推擠 */
        }
        .site-version-line .autocomplete-wrapper.v-hidden{
            visibility: hidden;
            opacity: 0;
            pointer-events: none;
        }

        /* 試玩模式（掛在站別上）：UI 對齊版本輸入框與加入按鈕 */
        .trial-line{
            display: grid;
            grid-template-columns: 260px 240px max-content; /* 對齊：廳主欄 / 帳號欄 / 加入按鈕（按鈕不拉伸） */
            align-items: center;
            column-gap: 6px; /* 與廳主/帳號同樣緊密 */
        }
        .trial-line label{
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            margin: 0;
            white-space: nowrap;
        }
        .trial-line .autocomplete-wrapper{
            width: 240px; /* 對齊「帳號」欄位寬度 */
            flex: 0 0 auto;
            min-width: 0;
            display: block;
        }
        /* 為避免推擠：使用 visibility 保留高度 */
        .trial-line .autocomplete-wrapper.v-hidden,
        .trial-line .pair-add-btn.v-hidden{
            visibility: hidden;
            opacity: 0;
            pointer-events: none;
        }

        .trial-line .pair-add-btn{
            justify-self: start;
            width: fit-content;
        }
                /* 站別輸入框短一點：右側留給已選 chip */
        .site-select-wrap{ width: 220px; }
        .site-select-wrap input{ width: 100%; }

        /* ====== ✅ 新增：裝置型號欄位 ====== */
        .device-row.with-model {
            grid-template-columns: 120px 220px 1fr;
        }
        .device-row.android.with-model {
            grid-template-columns: 120px 220px 140px 1fr;
        }
        
        /* Android：讓各欄位 input 充滿各自的 grid 欄位，避免視覺間距不一致 */
        .device-row.android.with-model .autocomplete-wrapper,
        .device-row.android.with-model input[type="text"]{
            width: 100%;
        }
        .device-row.android.with-model .autocomplete-wrapper input[type="text"]{
            width: 100%;
        }
/* PC 原本兩欄，改為三欄（label + 型號 + 瀏覽器） */
        #pc-row.with-model {
            grid-template-columns: 120px 220px 1fr;
        }
        /* iOS 原本兩欄，改為三欄（label + OS + 型號） */
        #ios-row.with-model {
            grid-template-columns: 120px 220px 140px;
        }


        
        /* iOS：避免型號被截短（讓型號欄位可伸縮並撐滿） */
        #ios-row.with-model .autocomplete-wrapper,
        #ios-row.with-model .autocomplete-wrapper input[type="text"]{
            width: 100%;
        }
/* ====== 修正：iOS 型號 / 系統版本需同一列 ====== */
        .device-row.with-model .autocomplete-wrapper {
            flex: 0;
            width: auto;
        }


        /* ====== ✅ 固定：保持 index_fixed7 的高度/間距，並讓「版本」輸入框寬度比照 PC/Android 欄位 ====== */
        /* 目標：
           - 保持 fixed7：兩行版本之間 gap=0、輸入框用 visibility 切換避免推擠
           - 版本輸入框寬度改為與 PC/Android 的單一欄位寬度一致（300px）
        */

        :root{
            --std-field-w: 300px; /* PC/Android 欄位的標準寬度（device-row 的 300px 欄位） */
        }

        /* fixed7：只覆寫版本那一列的 column gap（原本 inline gap:10px 會讓兩行行距過大） */
        .form-row:has(#version-game-check) > div[style*="flex-direction:column"]{
            gap: 0 !important;
        }

        /* fixed7：版本輸入框固定佔位（不推擠） */
        #version-game-wrapper,
        #version-bet-wrapper{
            display: block !important;      /* 覆寫 inline display:none */
            flex: 0 0 var(--std-field-w);   /* ✅ 寬度比照 PC/Android */
            width: var(--std-field-w);
            min-width: 0;
        }
        #version-game,
        #version-bet{
            width: 100%;                    /* 充滿上面的 300px wrapper */
            min-width: 0;
        }

        /* 未勾選：隱藏但保留空間（不推擠） */
        label:has(#version-game-check:not(:checked)) + #version-game-wrapper,
        label:has(#version-bet-check:not(:checked)) + #version-bet-wrapper{
            visibility: hidden;
            opacity: 0;
            pointer-events: none;
        }
        /* 勾選：顯示 */
        label:has(#version-game-check:checked) + #version-game-wrapper,
        label:has(#version-bet-check:checked) + #version-bet-wrapper{
            visibility: visible;
            opacity: 1;
            pointer-events: auto;
        }


/* BUG 等級參考表：讓儲存格內容盡量單行顯示（不足則水平捲動） */
.bug-ref-wrap{overflow-x:auto;}
.bug-ref-table{
  min-width: 1600px; /* 提高最小寬度，降低換行機率 */
  table-layout: auto;
}
.bug-ref-table th,
.bug-ref-table td{
  white-space: nowrap; /* 儲存格內容單行 */
  font-size: 13px;     /* 稍微縮小字體以避免擁擠 */
  padding: 10px 12px;  /* 調整內距 */
}

/* 定義欄位：全部置中（支援rowspan） */
.bug-level-table th.bug-def,
.bug-level-table td.bug-def{
    text-align: center;
}

/* BUG 等級表：全部內容置中（等級 / 定義 / 範例） */
.bug-level-table th,
.bug-level-table td{
  text-align: center;
}

        /* ====== 暫存 / 存檔 UI ====== */
        .banner {
            display: none;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 12px 14px;
            border-radius: 10px;
            background: #fff6d6;
            border: 1px solid #f3d37b;
            margin: 14px 0 0;
        }
        .banner .banner-actions{
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .banner button{
            padding: 8px 14px;
            border-radius: 999px;
            border: none;
            background: #333;
            color: #fff;
            cursor: pointer;
            font-weight: 600;
        }
        .banner button.secondary{
            background: #777;
        }

        .modal-overlay{
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 18px;
            z-index: 9999;
        }
        .modal{
            width: min(920px, 100%);
            max-height: 85vh;
            overflow: auto;
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            padding: 18px 18px 14px;
        }
        .modal-header{
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
        }
        .modal-title{
            font-size: 18px;
            font-weight: 800;
        }
        .modal-close{
            border: none;

const app = initializeApp(firebaseConfig);

function updateAuthUI(user){
  const statusEl = document.getElementById("auth-status");
  const loginBtn = document.getElementById("login-btn");
  const logoutBtn = document.getElementById("logout-btn");
  const saveBtn = document.getElementById("open-save-modal-btn");

  }else{

}

async function signInWithGoogle(){
  try{
    await signInWithPopup(auth, googleProvider);

  }catch(e){

}

async function signOutUser(){

// 將本機存檔同步到雲端（登入狀態下才會執行）
async function saveUserStateToCloud(){
  if(!currentUser) return;
  try{
    const saves = getSaves();
    const payload = {
      saves: Array.isArray(saves) ? saves : [],
      updatedAt: Date.now()
    };
    const ref = doc(db, "userStates", currentUser.uid);
    await setDoc(ref, payload, { merge: true });
  }catch(e){
    console.error("同步到雲端失敗", e);
  }
}

// 從雲端載入存檔到本機（登入後自動執行一次）
async function loadUserStateFromCloud(){
  if(!currentUser) return;
  try{
    const ref = doc(db, "userStates", currentUser.uid);
    const snap = await getDoc(ref);
    const saves = (snap.exists() && Array.isArray(snap.data()?.saves))
      ? snap.data().saves
      : [];
    try{
      localStorage.setItem(LS_SAVES_KEY, JSON.stringify(saves));
    }catch(e){}

    try{
      refreshDraftUI();
      renderSaveList();
    }catch(e){}
  }catch(e){
    console.error("從雲端載入狀態失敗", e);
  }
}

// 即時監聽：登入同一帳號的其它裝置有變更時，立即同步到本機
function startUserStateRealtimeListener(){
  // 先取消舊的監聽，避免重覆
  if(userStateUnsub){
    try{ userStateUnsub(); }catch(e){}
    userStateUnsub = null;
  }
  if(!currentUser) return;

  const ref = doc(db, "userStates", currentUser.uid);
  userStateUnsub = onSnapshot(ref, (snap) => {
    const saves = (snap.exists() && Array.isArray(snap.data()?.saves))
      ? snap.data().saves
      : [];
    try{
      localStorage.setItem(LS_SAVES_KEY, JSON.stringify(saves));
    }catch(e){}

    try{
      refreshDraftUI();
      renderSaveList();
    }catch(e){}
  }, (error) => {
    console.error("即時監聽 userStates 失敗", error);
  });
}

onAuthStateChanged(auth, (user) => {
  currentUser = user || null;
  console.log("Auth state changed:", currentUser ? currentUser.uid : "signed out");
  updateAuthUI(currentUser);
  if(currentUser){
    loadUserStateFromCloud();
    startUserStateRealtimeListener();
  }else{
    if(userStateUnsub){
      try{ userStateUnsub(); }catch(e){}
      userStateUnsub = null;
    }
  }
});

// ====== 遊戲搜尋欄位自動調整寬度（依 placeholder / 輸入內容量測） ======
function _measureTextWidth(text, el){
    const cs = getComputedStyle(el);
    const font = `${cs.fontStyle} ${cs.fontVariant} ${cs.fontWeight} ${cs.fontSize} / ${cs.lineHeight} ${cs.fontFamily}`;
    const canvas = _measureTextWidth._c || (_measureTextWidth._c = document.createElement('canvas'));
    const ctx = canvas.getContext('2d');
    ctx.font = font;
    return ctx.measureText(text || '').width;
}

function _autoSizeInputToText(inputEl, text){
    const cs = getComputedStyle(inputEl);
    const pad = (parseFloat(cs.paddingLeft)||0) + (parseFloat(cs.paddingRight)||0);
    const border = (parseFloat(cs.borderLeftWidth)||0) + (parseFloat(cs.borderRightWidth)||0);
    let w = Math.ceil(_measureTextWidth(text, inputEl) + pad + border + 2); // +2: 保險避免被吃字

    // 不要超過父容器寬度
    const parent = inputEl.parentElement;
    if(parent){
        const max = parent.clientWidth;
        if(max && w > max) w = max;
    }
    // 避免太窄
    if(w < 120) w = 120;

    inputEl.style.width = w + 'px';
}

function autoSizeGameInput(){
    if(!gameInput) return;
    const text = (gameInput.value && gameInput.value.trim()) ? gameInput.value : gameInput.placeholder;
    _autoSizeInputToText(gameInput, text);
}


let selectedGames = []; // [{id,name}]

/* --- 遊戲 vs 標題序號：二擇一互斥 --- */
function syncTitleGameExclusive(){
    if(!gameInput || !titleSerialInput) return;

    const hasSerial = (titleSerialInput.value || "").trim() !== "";
    const hasGame = Array.isArray(selectedGames) && selectedGames.length > 0;

    if(hasSerial){
        // 序號有值 → 清空遊戲並鎖住遊戲輸入
        if(hasGame){
            selectedGames = [];
            try{ renderSelectedGames(); }catch(e){}
        }
        gameInput.value = "";
        try{ autoSizeGameInput(); }catch(e){}
        try{ gameSuggest.style.display = "none"; }catch(e){}
        gameInput.disabled = true;
        titleSerialInput.disabled = false;
    }else if(hasGame){
        // 有選遊戲 → 清空序號並鎖住序號輸入
        if((titleSerialInput.value || "").trim() !== ""){
            titleSerialInput.value = "";
        }
        titleSerialInput.disabled = true;
        gameInput.disabled = false;
    }else{
        // 都沒有 → 兩者都解鎖
        gameInput.disabled = false;
        titleSerialInput.disabled = false;
    }
}

/* --- 符號全形化（僅轉換 ASCII 符號） --- */
function toFullWidthSymbols(str){
    if (str == null) return "";
    return String(str)
        .replace(/\\/g, "＼")
        .replace(/\//g, "／")
        .replace(/-/g, "－")
        .replace(/:/g, "：")
        .replace(/;/g, "；")
        .replace(/,/g, "，")
        .replace(/\?/g, "？")
        .replace(/!/g, "！")
        .replace(/\(/g, "（")
        .replace(/\)/g, "）")
        .replace(/\[/g, "［")
        .replace(/\]/g, "］")
        .replace(/\{/g, "｛")
        .replace(/\}/g, "｝")
        .replace(/</g, "＜")
        .replace(/>/g, "＞")
        .replace(/\+/g, "＋")
        .replace(/=/g, "＝")
        .replace(/\*/g, "＊")
        .replace(/@/g, "＠")
        .replace(/#/g, "＃")
        .replace(/%/g, "％")
        .replace(/&/g, "＆")
        .replace(/\^/g, "＾")
        .replace(/\|/g, "｜")
        .replace(/"/g, "＂")
        .replace(/'/g, "＇")
        .replace(/~/g, "～")
        // 日期維持半形連字號（YYYY-MM-DD）
        .replace(/(\d{4})－(\d{2})－(\d{2})/g, "$1-$2-$3");
}
/* --- 標題生成 --- */
function updateTitle(){
    const desc = document.getElementById("problem-desc").value.trim();
    const bugLv = (document.getElementById("bug-level")?.value || "").trim();
    const bugEmoji = bugLv === "高" ? "🔴" : (bugLv === "中" ? "🟠" : (bugLv === "低" ? "🟡" : ""));
    const serialRaw = (document.getElementById("title-serial")?.value || "").trim();
    const serial = serialRaw; // 可留空

    // core：遊戲名稱（可有可無） + 內容描述
    let core = "";
    if (selectedGames.length){
        const gamePart = selectedGames.map(g => {
            const id = g.id.replace('Game','');
            return `${id}_${g.name}`;
        }).join("、");

        core = desc ? `${gamePart}_${desc}` : gamePart;
    } else if (desc){
        core = desc;
    }

    // 目標輸出：顏色EMOJI +（可選）序號 + '.' + core
    // 範例：🟠 12.非核心流程中斷，但會造成大範圍使用影響
    let result = "";

    if (bugEmoji) result += bugEmoji;
    if (serial){
        // 有序號：與前方 emoji 用一個空白分隔（如果有 emoji）
        result += (bugEmoji ? " " : "") + serial + (core ? "." + core : ".");
    } else {
        // 無序號：只接 core（若前方有 emoji，與 core 用一個空白分隔）
        if (core) result += (bugEmoji ? " " : "") + core;
    }

    const __titleFW = toFullWidthSymbols(result);
    document.getElementById("title-preview").value = __titleFW;
    updateFullPreview();
}


document.getElementById("problem-desc").addEventListener("input",updateTitle);
document.getElementById("bug-level").addEventListener("change",updateTitle);
document.getElementById("title-serial").addEventListener("input",updateTitle);

/* --- 智能 OS 補字首 --- */
function formatOS(prefix, value){
    value = value.trim();
    if (!value) return "";
    return `${prefix} ${value}`;
}

/* --- 智能瀏覽器判斷（PC / Android 共用） --- */
function formatBrowser(value){
    const v = value.trim();
    if (!v) return "";

    if (!/^[0-9.]+$/.test(v)){
        return `瀏覽器：${v}`;
    }
    return `瀏覽器：Chrome ${v}`;
}

/* --- 裝置資料組裝（回傳每裝置一行字串） --- */

function getDeviceLines(){
    const lines = [];

    // 去除 formatBrowser() 可能自帶的「瀏覽器：」前綴
    const normBrowser = (s) => (s || "").replace(/^瀏覽器：\s*/, "").trim();
    const joinSlash = (arr) => arr.filter(Boolean).join("／");

    const pcOn = document.getElementById("device-pc").checked;
    const androidOn = document.getElementById("device-android").checked;
    const iosOn = document.getElementById("ios-check").checked;

    const total = (pcOn?1:0) + (androidOn?1:0) + (iosOn?1:0);

    // PC 詳細：Chrome 111
    const getPC = () => {
        const br = normBrowser(formatBrowser(document.getElementById("pc-browser").value));
        return br || ""; // 允許空
    };

    // Android 詳細：Android 456／Chrome 789（如有型號則：Pixel 7／Android 456／Chrome 789）
    const getAndroid = () => {
        const model = (document.getElementById("android-model").value || "").trim();
        const osVal = (document.getElementById("android-os").value || "").trim();
        const br = normBrowser(formatBrowser(document.getElementById("android-browser").value));

        const platform = osVal ? `Android ${osVal}` : "Android";
        const parts = [];
        if (model) parts.push(model);
        parts.push(platform);
        if (br) parts.push(br);

        return joinSlash(parts);
    };

    // iOS 詳細：iOS 222／Safari 222、Chrome 333、Egg 11451（如有型號則：iPhone 13／iOS 222／...）
    const getIOS = () => {
        const model = (document.getElementById("ios-model").value || "").trim();
        const osVal = (document.getElementById("ios-os").value || "").trim();

        const browsers = [];
        if (document.getElementById("ios-safari").checked) {
            const v = (document.getElementById("ios-safari-version").value || "").trim();
            browsers.push(v ? `Safari ${v}` : "Safari");
        }
        if (document.getElementById("ios-chrome").checked) {
            const v = (document.getElementById("ios-chrome-version").value || "").trim();
            browsers.push(v ? `Chrome ${v}` : "Chrome");
        }
        const on = (document.getElementById("ios-other-name").value || "").trim();
        const ov = (document.getElementById("ios-other-version").value || "").trim();
        if (on || ov) browsers.push(`${on || "其他"}${ov ? " " + ov : ""}`.trim());

        const platform = osVal ? `iOS ${osVal}` : "iOS";

        const parts = [];
        if (model) parts.push(model);
        parts.push(platform);
        if (browsers.length) parts.push(browsers.join("、"));

        return joinSlash(parts);
    };

    // 無選擇：略過整段（由呼叫端處理）
    if (!total) return lines;

    // 單選：若是 Android / iOS，使用「．手機：...」單行；若是 PC，使用「．PC：...」單行
    if (total === 1) {
        if (androidOn) {
            lines.push(`．手機：${getAndroid()}`);
            return lines;
        }
        if (iosOn) {
            lines.push(`．手機：${getIOS()}`);
            return lines;
        }
        if (pcOn) {
            const pc = getPC();
            lines.push(pc ? `．PC：${pc}` : "．PC");
            return lines;
        }
    }

    // 多選：PC 單列；手機依選擇數決定呈現（單選手機＝單行；Android+iOS＝群組巢狀）
    if (pcOn) {
        const pc = getPC();
        lines.push(pc ? `．PC：${pc}` : "．PC");
    }

    // 手機只有單選（不論是否同時有 PC）→ 單行呈現：．手機：iOS ... / Android ...
    if ((androidOn || iosOn) && !(androidOn && iosOn)) {
        if (androidOn) lines.push(`．手機：${getAndroid()}`);
        if (iosOn) lines.push(`．手機：${getIOS()}`);
        return lines;
    }

    // Android + iOS 同時勾選 → 手機群組巢狀條列
    if (androidOn && iosOn) {
        lines.push("．手機：");
        lines.push(`　．${getAndroid()}`);
        lines.push(`　．${getIOS()}`);
    }

    return lines;
}

// ✅ 同步「每站別版本」DOM → window.siteConfigs（保險用）
function syncSiteVersionsFromDOM(){
    const sites = (window.selectedSites || []);
    sites.forEach(siteName => {
        const card = document.querySelector(`.site-config-card[data-site="${siteName}"]`);
        if(!card) return;
        const cfg = normSiteCfg(siteName);

        const gameChk = card.querySelector(`input[type="checkbox"][data-site="${siteName}"][data-vkey="gameEnabled"]`);
        const betChk  = card.querySelector(`input[type="checkbox"][data-site="${siteName}"][data-vkey="betEnabled"]`);
        const gameInp = card.querySelector(`input[type="text"][data-site="${siteName}"][data-vkey="game"]`);
        const betInp  = card.querySelector(`input[type="text"][data-site="${siteName}"][data-vkey="bet"]`);

        if(gameChk) cfg.versions.gameEnabled = !!gameChk.checked;
        if(betChk)  cfg.versions.betEnabled  = !!betChk.checked;
        if(gameInp) cfg.versions.game        = (gameInp.value || "").trim();
        if(betInp)  cfg.versions.bet         = (betInp.value || "").trim();
    });
}

function updateFullPreview(){
    const date = document.getElementById("incident_date").value;
    const dateDisp = (date || "").trim() || "-";
    const tester = document.getElementById("tester").value;
    const testerDisp = (tester || "").trim() || "-";
    const selectedSitesList = (window.selectedSites || []);
    const siteConfigs = (window.siteConfigs || {});
    const orderRaw = document.getElementById("order_id").value.trim();

    // ✅ 保險：同步每站別版本（避免瀏覽器自動回填 input 但未觸發 input 事件）
    syncSiteVersionsFromDOM();

    const op = document.getElementById("operation_editor").innerText.trim();
    const act = document.getElementById("actual_editor").innerText.trim();
    const exp = document.getElementById("expected_editor").innerText.trim();
    const remark = document.getElementById("remark_editor").innerText.trim();

    const lines = [];

    // Header
    lines.push(`發生時間：${dateDisp}`);
    lines.push(`測試者：${testerDisp}`);
    lines.push(`站別：${selectedSitesList.length ? selectedSitesList.join("、") : "-"}`);
    lines.push("");

    
// 測試廳主／帳號 & 版本（單站別：不重複站別名；複數站別：站別底下巢狀條列）
if (selectedSitesList.length === 0) {
    lines.push("測試廳主／帳號：");
    lines.push("．-");
    lines.push("");
} else if (selectedSitesList.length === 1) {
    const siteName = selectedSitesList[0];
    const cfg = normSiteCfg(siteName);

    // 測試廳主／帳號（試玩模式可獨立存在：若沒有一般廳主/帳號，就不輸出 '-'，直接略過該小段）
    lines.push("測試廳主／帳號：");

    const pairs = (cfg.pairs && cfg.pairs.length) ? cfg.pairs : [];
    const trialOn = !!(cfg.trial && cfg.trial.enabled);

    if (pairs.length) {
        lines.push("．廳主／帳號：");
        pairs.forEach(p => lines.push(`　．${p.hall}／${p.account}`));
    }

    if (trialOn) {
        lines.push("．試玩模式：");
        const halls = (cfg.trial.halls && cfg.trial.halls.length) ? cfg.trial.halls : [];
        if (halls.length) halls.forEach(h => lines.push(`　．${h}`));
        else lines.push("　．-");
    }

    if (!pairs.length && !trialOn) {
        lines.push("．-");
    }

    lines.push("");

    // 版本：若此站別沒有勾選任何版本，整段略過（避免「只需要試玩模式」時出現 '-'）
    {
        const v = cfg.versions || {};
        const hasAny = !!(v.gameEnabled || v.betEnabled);
        if (hasAny) {
            lines.push("版本：");
            if (v.gameEnabled) {
                const val = String(v.game || "").trim();
                lines.push(`．遊戲版本：${val || "-"}`);
            }
            if (v.betEnabled) {
                const val = String(v.bet || "").trim();
                lines.push(`．投注歷程版本：${val || "-"}`);
            }
            lines.push("");
        }
    }
} else {
    // 複數站別：站別底下巢狀條列
    lines.push("測試廳主／帳號：");
    selectedSitesList.forEach(siteName => {
        const cfg = normSiteCfg(siteName);

        lines.push(`．${siteName}：`);

        const pairs = (cfg.pairs && cfg.pairs.length) ? cfg.pairs : [];
        const trialOn = !!(cfg.trial && cfg.trial.enabled);

        if (pairs.length) {
            lines.push("　．廳主／帳號：");
            pairs.forEach(p => lines.push(`　　．${p.hall}／${p.account}`));
        }

        if (trialOn) {
            lines.push("　．試玩模式：");
            const halls = (cfg.trial.halls && cfg.trial.halls.length) ? cfg.trial.halls : [];
            if (halls.length) halls.forEach(h => lines.push(`　　．${h}`));
            else lines.push("　　．-");
        }

        if (!pairs.length && !trialOn) {
            lines.push("　．-");
        }
    });
    lines.push("");

    // 版本（複選：僅輸出有勾選版本的站別；若全都沒勾選則整段略過）
    const anySiteHasVersion = selectedSitesList.some(siteName => {
        const v = (normSiteCfg(siteName).versions || {});
        return !!(v.gameEnabled || v.betEnabled);
    });

    if (anySiteHasVersion) {
        lines.push("版本：");
        selectedSitesList.forEach(siteName => {
            const cfg = normSiteCfg(siteName);
            const v = cfg.versions || {};
            const hasAny = !!(v.gameEnabled || v.betEnabled);
            if (!hasAny) return;

            lines.push(`．${siteName}：`);
            if (v.gameEnabled) {
                const val = String(v.game || "").trim();
                lines.push(`　．遊戲版本：${val || "-"}`);
            }
            if (v.betEnabled) {
                const val = String(v.bet || "").trim();
                lines.push(`　．投注歷程版本：${val || "-"}`);
            }
        });
        lines.push("");
    }
}

// 裝置（空內容整段略過）

    const deviceLines = getDeviceLines();
    if (deviceLines.length) {
        lines.push("裝置：");
        deviceLines.forEach(l => lines.push(l));
        lines.push("");
    }

    // 注單編號（空內容整段略過）
    if (orderRaw) {
        lines.push(`注單編號：${orderRaw}`);
        lines.push("");
    }

    // 操作 / 實際結果 / 預期結果（保留段落結構，段落間固定空一行）
    lines.push("操作：");
    if (op) lines.push(op);
    lines.push("");

    lines.push("實際結果：");
    if (act) lines.push(act);
    lines.push("");

    lines.push("預期結果：");
    if (exp) lines.push(exp);

    if (remark) {
        lines.push("");
        lines.push("備註：");
        lines.push(remark);
    }

    document.getElementById("full-preview").value = toFullWidthSymbols(lines.join("\n"));
}

/* --- 自訂記憶 autocomplete --- */
function loadMemory(key){ try{return JSON.parse(localStorage.getItem(key))||[]}catch{return[]} }
function saveMemory(key,arr){ localStorage.setItem(key,JSON.stringify(arr)); }

function setupMemoryField(id,key){
    const input=document.getElementById(id);
    const wrap=input.closest(".autocomplete-wrapper");
    const box=wrap.querySelector(".suggestions");
    let list=loadMemory(key);

    function render(filter=""){
        const kw=filter.toLowerCase();
        box.innerHTML="";

        const matches=list.filter(v=>v.toLowerCase().includes(kw));
        matches.forEach(v=>{
            const div=document.createElement("div");
            div.className="suggestion-item";
            div.textContent=v;
            div.addEventListener("mousedown",()=>{
                input.value=v;
                box.style.display="none";
                updateFullPreview();
            });
            box.appendChild(div);
        });

        box.style.display = matches.length ? "block":"none";
    }

    input.addEventListener("focus",()=>render(""));
    input.addEventListener("input",()=>render(input.value));

    input.addEventListener("blur",()=>{
        const v=input.value.trim();
        if(v && !list.includes(v)){
            list.push(v);
            saveMemory(key,list);
        }
        setTimeout(()=>box.style.display="none",120);
    });
}

// 供動態產生的 input 使用（例如：每站別版本欄位）
function setupMemoryFieldElement(input,key){
    if(!input || !key) return;
    const wrap=input.closest(".autocomplete-wrapper");
    if(!wrap) return;
    const box=wrap.querySelector(".suggestions");
    if(!box) return;
    let list=loadMemory(key);

    function render(filter=""){
        const kw=filter.toLowerCase();
        box.innerHTML="";
        const matches=list.filter(v=>v.toLowerCase().includes(kw));
        matches.forEach(v=>{
            const div=document.createElement("div");
            div.className="suggestion-item";
            div.textContent=v;
            div.addEventListener("mousedown",()=>{
                input.value=v;
                box.style.display="none";
                updateFullPreview();
            });
            box.appendChild(div);
        });
        box.style.display = matches.length ? "block":"none";
    }

    input.addEventListener("focus",()=>render(""));
    input.addEventListener("input",()=>render(input.value));
    input.addEventListener("blur",()=>{
        const v=input.value.trim();
        if(v && !list.includes(v)){
            list.push(v);
            saveMemory(key,list);
        }
        setTimeout(()=>box.style.display="none",120);
    });
}

if (siteInput){

const siteList = ["測試站","正式站","開發站"];

window.selectedSites = window.selectedSites || [];
window.siteConfigs = window.siteConfigs || {}; // { [siteName]: {halls:[], pairs:[], versions:{...}} }

function normSiteCfg(siteName){
    if(!window.siteConfigs[siteName]){
        window.siteConfigs[siteName] = { halls: [], pairs: [], versions: { gameEnabled: false, game: "", betEnabled: false, bet: "" } };
    }
    const cfg = window.siteConfigs[siteName];
    if(!cfg.halls) cfg.halls = [];
    if(!cfg.pairs) cfg.pairs = [];
    if(!cfg.versions) cfg.versions = { gameEnabled: false, game: "", betEnabled: false, bet: "" };
    if(typeof cfg.versions.gameEnabled !== "boolean") cfg.versions.gameEnabled = false;
    if(typeof cfg.versions.betEnabled  !== "boolean") cfg.versions.betEnabled  = false;
    if(typeof cfg.versions.game !== "string") cfg.versions.game = "";
    if(typeof cfg.versions.bet  !== "string") cfg.versions.bet  = "";


// ✅ 試玩模式（掛在站別上）：每站別可獨立啟用試玩廳主清單，版本沿用該站別版本
if(!cfg.trial) cfg.trial = { enabled: false, halls: [] };
if(typeof cfg.trial.enabled !== "boolean") cfg.trial.enabled = false;
if(!Array.isArray(cfg.trial.halls)) cfg.trial.halls = [];
// 舊資料相容：若曾用 cfg.halls 作為試玩廳主清單，搬到 cfg.trial.halls
if(Array.isArray(cfg.halls) && cfg.halls.length && (!cfg.trial.halls || !cfg.trial.halls.length)){
    cfg.trial.halls = cfg.halls.slice();
}

    // 舊版相容：若曾使用 accounts（已停用），嘗試轉為 pairs（以索引配對）
    if(cfg.accounts && Array.isArray(cfg.accounts) && cfg.accounts.length && (!cfg.pairs || !cfg.pairs.length)){
        const halls = Array.isArray(cfg.halls) ? cfg.halls : [];
        const accs  = cfg.accounts;
        const pairs = [];
        const n = Math.min(halls.length, accs.length);
        for(let i=0;i<n;i++){
            const h = (halls[i]||"").trim();
            const a = (accs[i]||"").trim();
            if(h && a) pairs.push({ hall: h, account: a });
        }
        cfg.pairs = pairs;
    }

    return cfg;
}

/* --- 各站別：廳主／帳號（可搜尋複選） --- */
const HALL_OPTIONS = ["Tidy遊戲商測試廳","Tidy遊戲級距測試廳","DB TEST"]; // 可自行擴充

function makeMultiSelect({
    container,
    options,
    placeholder,
    getSelected,
    setSelected,
    memoryKey
}){
    const wrap = document.createElement("div");
    wrap.className = "autocomplete-wrapper";

    const input = document.createElement("input");
    input.type = "text";
    input.autocomplete = "new-password";
    input.placeholder = placeholder;

    const sugg = document.createElement("div");
    sugg.className = "suggestions";

    const selectedBox = document.createElement("div");
    selectedBox.style.display = "flex";
    selectedBox.style.flexWrap = "wrap";
    selectedBox.style.gap = "4px";
    selectedBox.style.minHeight = "34px";
    selectedBox.style.visibility = "hidden";
    selectedBox.style.marginTop = "1px";

    wrap.appendChild(input);
    wrap.appendChild(sugg);

    container.appendChild(wrap);
    container.appendChild(selectedBox);

    let memList = [];
    if (memoryKey){
        try{ memList = JSON.parse(localStorage.getItem(memoryKey)) || []; }catch{ memList=[]; }
    }

    function saveMem(v){
        if(!memoryKey) return;
        if(v && !memList.includes(v)){
            memList.push(v);
            localStorage.setItem(memoryKey, JSON.stringify(memList));
        }
    }

    function renderSelected(){
        selectedBox.innerHTML = "";
        getSelected().forEach((v, idx) => {
            const chip = document.createElement("div");
            chip.className = "game-chip";
            chip.textContent = v;
            const btn = document.createElement("button");
            btn.type = "button";
            btn.textContent = "×";
            btn.addEventListener("click", () => {
                const arr = getSelected().slice();
                arr.splice(idx, 1);
                setSelected(arr);
                renderSelected();
                updateFullPreview();
            });
            chip.appendChild(btn);
            selectedBox.appendChild(chip);
        });
        // ✅ 預留高度但避免空白太突兀：沒選項時先隱藏（仍保留高度）
        selectedBox.style.visibility = getSelected().length ? "visible" : "hidden";
    }

    function renderSuggest(filter=""){
        const kw = filter.trim().toLowerCase();
        sugg.innerHTML = "";

        const all = (options || []).concat(memList);
        const uniq = Array.from(new Set(all));
        const matches = uniq.filter(v => v.toLowerCase().includes(kw));

        // 清除全部
        const clearDiv = document.createElement("div");
        clearDiv.className = "suggestion-item";
        clearDiv.textContent = "(清除全部)";
        clearDiv.addEventListener("mousedown", () => {
            setSelected([]);
            input.value = "";
            sugg.style.display = "none";
            renderSelected();
            updateFullPreview();
        });
        sugg.appendChild(clearDiv);

        matches.forEach(v => {
            const div = document.createElement("div");
            div.className = "suggestion-item";
            div.textContent = v;
            div.addEventListener("mousedown", () => {
                const arr = getSelected().slice();
                if(!arr.includes(v)) arr.push(v);
                setSelected(arr);
                input.value = "";
                renderSelected();
                sugg.style.display = "none";
                saveMem(v);
                updateFullPreview();
            });
            sugg.appendChild(div);
        });

        sugg.style.display = matches.length ? "block" : "none";
    }

    input.addEventListener("focus", () => renderSuggest(""));
    input.addEventListener("input", () => renderSuggest(input.value));

    // 允許直接輸入 Enter 加入（適用帳號）
    input.addEventListener("keydown", (e) => {
        if (e.key === "Enter"){
            const v = input.value.trim();
            if(v){
                const arr = getSelected().slice();
                if(!arr.includes(v)) arr.push(v);
                setSelected(arr);
                input.value = "";
                renderSelected();
                saveMem(v);
                sugg.style.display = "none";
                updateFullPreview();
            }
            e.preventDefault();
        }
    });

    document.addEventListener("click", (e) => {
        if (!wrap.contains(e.target)) sugg.style.display = "none";
    });

    renderSelected();
    return { renderSelected };
}

/* ===================== 存檔（localStorage） ===================== */
const LS_SAVES_KEY = "task_report_saves_v1";
const LS_RESCUE_KEY = "task_report_rescue_v1";
let __skipNextAutosave = false;

function _nowTs(){ return Date.now(); }
function _fmtTime(ts){
    try{
        const d = new Date(ts);
        const pad = (n)=> String(n).padStart(2,"0");
        return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }catch(e){ return ""; }
}

function collectState(){
    // ✅ 先把站別版本從 DOM 同步回 siteConfigs
    try{ syncSiteVersionsFromDOM(); }catch(e){}

    const inputs = {};
    document.querySelectorAll("input, select, textarea").forEach(el=>{
        const key = el.id || el.name;
        if(!key) return;
        const t = (el.type || "").toLowerCase();
        if(t === "checkbox" || t === "radio"){
            inputs[key] = !!el.checked;
        }else{
            inputs[key] = el.value;
        }
    });

    const editors = {};
    document.querySelectorAll('[contenteditable="true"][id]').forEach(el=>{
        editors[el.id] = el.innerText;
    });

    return {
        v: 1,
        savedAt: _nowTs(),
        inputs,
        editors,
        selectedGames: (Array.isArray(selectedGames) ? selectedGames : []),
        selectedSites: (Array.isArray(window.selectedSites) ? window.selectedSites : []),
        siteConfigs: (window.siteConfigs || {})
    };
}

function applyState(state){
    if(!state) return;

    // 避免套用 state 時觸發「未存檔提示」或 dirty 標記
    window.__applyingState = true;
    try{
        // 先處理動態區塊（遊戲/站別）→ 讓後續 input 值能套用到已生成的 DOM
        if(Array.isArray(state.selectedGames)){
            selectedGames = state.selectedGames;
            try{ renderSelectedGames(); }catch(e){}
        }

        if(Array.isArray(state.selectedSites)){
            window.selectedSites = state.selectedSites;
        }
        if(state.siteConfigs){
            window.siteConfigs = state.siteConfigs;
        }
        try{
            renderSelectedSites();
            renderSiteConfigBlocks();
        }catch(e){}

        // input/select/textarea
        if(state.inputs){
            Object.keys(state.inputs).forEach(key=>{
                let el = document.getElementById(key);
                if(!el){
                    const esc = (window.CSS && CSS.escape) ? CSS.escape(key) : String(key).replace(/"/g,'\"');
                    el = document.querySelector(`[name="${esc}"]`);
                }
                if(!el) return;
                const t = (el.type || "").toLowerCase();
                if(t === "checkbox" || t === "radio"){
                    el.checked = !!state.inputs[key];
                }else{
                    el.value = (state.inputs[key] ?? "");
                }
            });
        }

        // contenteditable
        if(state.editors){
            Object.keys(state.editors).forEach(id=>{
                const el = document.getElementById(id);
                if(el && el.getAttribute("contenteditable") === "true"){
                    el.innerText = (state.editors[id] ?? "");
                }
            });
        }

        // refresh previews
        try{ syncTitleGameExclusive(); }catch(e){}
        try{ updateTitle(); }catch(e){}
        try{ updateFullPreview(); }catch(e){}
    }finally{
        window.__applyingState = false;
    }

    // 套用完成後視為「目前狀態已同步」
    try{ setDirty(false); }catch(e){}
}


/* ---------- 未存檔提示（dirty / 是否有內容） ---------- */
window.__dirty = false;
window.__applyingState = false;

function setDirty(v){
    window.__dirty = !!v;
}

function hasMeaningfulContent(){
    try{
        const st = collectState();
        if(Array.isArray(st.selectedGames) && st.selectedGames.length) return true;
        if(Array.isArray(st.selectedSites) && st.selectedSites.length) return true;

        if(st.editors){
            for(const k in st.editors){
                if((st.editors[k] || "").trim()) return true;
            }
        }
        if(st.inputs){
            for(const k in st.inputs){
                const v = st.inputs[k];
                if(typeof v === "boolean"){
                    if(v) return true;
                }else{
                    if(v != null && String(v).trim() !== "") return true;
                }
            }
        }
    }catch(e){}
    return false;
}

// 只做「未存檔判斷」用，並在編輯時 debounce 寫入救援快照（專為當機/斷電等非預期關閉）
let __rescueSaveTimer = null;
function scheduleRescueSave(){
    if(__rescueSaveTimer){
        clearTimeout(__rescueSaveTimer);
        __rescueSaveTimer = null;
    }
    if(!hasMeaningfulContent()) return;
    __rescueSaveTimer = setTimeout(() => {
        saveRescueSnapshot();
    }, 5000);  // 5 秒無操作後寫入救援快照，供非預期關閉時恢復
}

document.addEventListener("input", ()=>{
    if(window.__applyingState) return;
    setDirty(true);
    scheduleRescueSave();
}, true);
document.addEventListener("change", ()=>{
    if(window.__applyingState) return;
    setDirty(true);
    scheduleRescueSave();
}, true);

/* ---------- Saves (multiple) ---------- */
function getSaves(){
    try{
        const raw = localStorage.getItem(LS_SAVES_KEY);
        if(!raw) return [];
        const arr = JSON.parse(raw);
        return Array.isArray(arr) ? arr : [];
    }catch(e){ return []; }
}
function setSaves(arr){
    try{ localStorage.setItem(LS_SAVES_KEY, JSON.stringify(arr)); }catch(e){}
}

function _makeId(){
    try{
        if(window.crypto && crypto.randomUUID) return crypto.randomUUID();
    }catch(e){}
    return String(Date.now()) + "_" + Math.random().toString(16).slice(2);
}

function createSave(name){
    const n = (name || "").trim() || `未命名存檔 ${_fmtTime(_nowTs())}`;
    const arr = getSaves();
    arr.unshift({
        id: _makeId(),
        name: n,
        createdAt: _nowTs(),
        updatedAt: _nowTs(),
        state: collectState()
    });
    setSaves(arr);
    try{ setDirty(false); }catch(e){}
    clearRescueSnapshot();  // 已手動存檔，清除過去的救援快照，下次不再提示
    renderSaveList();
    try{ refreshDraftUI(); }catch(e){}
    saveUserStateToCloud();
}

function overwriteSave(id){
    const arr = getSaves();
    const s = arr.find(x=>x.id===id);
    if(!s) return;
    s.updatedAt = _nowTs();
    s.state = collectState();
    setSaves(arr);
    try{ setDirty(false); }catch(e){}
    clearRescueSnapshot();  // 已手動覆蓋存檔，清除過去的救援快照
    renderSaveList();
    try{ refreshDraftUI(); }catch(e){}
    saveUserStateToCloud();
}

function deleteSave(id){
    const arr = getSaves().filter(x=>x.id!==id);
    setSaves(arr);
    renderSaveList();
    try{ refreshDraftUI(); }catch(e){}
    saveUserStateToCloud();
}

function loadSave(id){
    const arr = getSaves();
    const s = arr.find(x=>x.id===id);
    if(!s) return;
    applyState(s.state);
    closeSaveModal();
    try{ setDirty(false); }catch(e){}
    clearRescueSnapshot();  // 讀取存檔後，過去的救援快照不再需要
    try{ refreshDraftUI(); }catch(e){}
}

function renameSave(id, newName){
    const n = (newName || "").trim();
    if(!n) return;
    const arr = getSaves();
    const s = arr.find(x=>x.id===id);
    if(!s) return;
    s.name = n;
    s.updatedAt = _nowTs();
    setSaves(arr);
    renderSaveList();
}

/* ---------- UI ---------- */
function openSaveModal(){
    const overlay = document.getElementById("save-modal-overlay");
    if(!overlay) return;
    overlay.style.display = "flex";
    overlay.setAttribute("aria-hidden","false");
    renderSaveList();
    refreshDraftUI();
}

function closeSaveModal(){
    const overlay = document.getElementById("save-modal-overlay");
    if(!overlay) return;
    overlay.style.display = "none";
    overlay.setAttribute("aria-hidden","true");
}

function renderSaveList(){
    const host = document.getElementById("save-list");
    if(!host) return;
    host.innerHTML = "";

    const arr = getSaves();
    if(!arr.length){
        const empty = document.createElement("div");
        empty.className = "muted";
        empty.textContent = "尚無存檔。";
        host.appendChild(empty);
        return;
    }

    arr.forEach(s=>{
        const item = document.createElement("div");
        item.className = "save-item";

        const meta = document.createElement("div");
        meta.className = "save-meta";

        const name = document.createElement("div");
        name.className = "save-name";
        name.contentEditable = "true";
        name.spellcheck = false;
        name.textContent = s.name || "未命名存檔";
        name.addEventListener("blur", ()=>{
            const val = (name.textContent || "").trim();
            if(val && val !== s.name) renameSave(s.id, val);
            else name.textContent = s.name || "未命名存檔";
        });

        const time = document.createElement("div");
        time.className = "save-time";
        const created = s.createdAt ? _fmtTime(s.createdAt) : "-";
        const updated = s.updatedAt ? _fmtTime(s.updatedAt) : "-";
        time.textContent = `建立：${created}　｜　更新：${updated}`;

        meta.appendChild(name);
        meta.appendChild(time);

        const actions = document.createElement("div");
        actions.className = "save-actions";

        const btnLoad = document.createElement("button");
        btnLoad.textContent = "讀取";
        btnLoad.addEventListener("click", ()=>{
            if(confirm(`確定要讀取「${(s.name || "未命名存檔").replace(/"/g, "＂")}」？目前的編輯內容將會被取代。`)){
                loadSave(s.id);
            }
        });

        const btnOverwrite = document.createElement("button");
        btnOverwrite.textContent = "覆蓋";
        btnOverwrite.className = "gray";
        btnOverwrite.addEventListener("click", ()=>{
            if(confirm(`確定要用目前的內容覆蓋「${(s.name || "未命名存檔").replace(/"/g, "＂")}」？原本的內容將無法復原。`)){
                overwriteSave(s.id);
            }
        });

        const btnDel = document.createElement("button");
        btnDel.textContent = "刪除";
        btnDel.className = "danger";
        btnDel.addEventListener("click", ()=>{
            if(confirm(`確定要刪除「${(s.name || "未命名存檔").replace(/"/g, "＂")}」？此操作無法復原。`)){
                deleteSave(s.id);
            }
        });

        actions.appendChild(btnLoad);
        actions.appendChild(btnOverwrite);
        actions.appendChild(btnDel);

        item.appendChild(meta);
        item.appendChild(actions);
        host.appendChild(item);
    });
}

// 救援暫存：只存在本機，用來處理非正常關閉的補救，不會同步到雲端
// 會記錄 uid，切換帳號時只顯示該帳號自己的救援快照
function saveRescueSnapshot(){
    try{
        if(!hasMeaningfulContent()) return;
        const payload = {
            v: 1,
            t: _nowTs(),
            uid: currentUser?.uid ?? null,
            state: collectState()
        };
        localStorage.setItem(LS_RESCUE_KEY, JSON.stringify(payload));
    }catch(e){}
}

function getRescueSnapshot(){
    try{
        const raw = localStorage.getItem(LS_RESCUE_KEY);
        if(!raw) return null;
        return JSON.parse(raw);
    }catch(e){ return null; }
}

function clearRescueSnapshot(){
    try{ localStorage.removeItem(LS_RESCUE_KEY); }catch(e){}
}

function refreshDraftUI(){
    const data = getRescueSnapshot();
    const banner = document.getElementById("rescue-banner");
    const timeEl = document.getElementById("rescue-banner-time");
    if(!banner) return;

    const myUid = currentUser?.uid ?? null;
    if(data && data.t && data.uid === myUid){
        banner.style.display = "flex";
        if(timeEl){
            timeEl.textContent = `（${_fmtTime(data.t)}）`;
        }
    }else{
        if(data && data.uid !== myUid){
            clearRescueSnapshot();
        }
        banner.style.display = "none";
        if(timeEl){
            timeEl.textContent = "";
        }
    }
}

/* --- 初始化 --- */

/* --- 初始化 --- */
window.addEventListener("DOMContentLoaded",()=>{
    setToday();

    /* --- 暫存 / 存檔：事件綁定 --- */

    // 關閉/離開分頁時：
    // 若有未儲存變更 → 跳出提示，且「清除」救援快照（使用者手動關閉，不保留）
    // 唯有當機/斷電等非預期關閉時，beforeunload/pagehide 可能不執行，上次 debounce 的救援快照才會留下
    window.addEventListener("beforeunload", (e)=>{
        try{
            clearRescueSnapshot();  // 手動關閉前一律清除，避免下次誤提示
            if(window.__dirty && hasMeaningfulContent()){
                e.preventDefault();
                e.returnValue = "";
            }
        }catch(err){}
        if(__skipNextAutosave){ __skipNextAutosave = false; return; }
    });

    window.addEventListener("pagehide", ()=>{
        if(__skipNextAutosave){ __skipNextAutosave = false; return; }
        clearRescueSnapshot();  // 分頁關閉時清除，不保留救援快照
    });

    // Modal open/close
    const openBtn = document.getElementById("open-save-modal-btn");
    const closeBtn = document.getElementById("close-save-modal-btn");
    const overlay = document.getElementById("save-modal-overlay");
    if(openBtn) openBtn.addEventListener("click", openSaveModal);
    if(closeBtn) closeBtn.addEventListener("click", closeSaveModal);
    if(overlay) overlay.addEventListener("mousedown", (e)=>{
        if(e.target === overlay) closeSaveModal();
    });

    // 救援暫存 Banner 按鈕
    const loadRescueBtn = document.getElementById("load-rescue-btn");
    const discardRescueBtn = document.getElementById("discard-rescue-btn");
    if(loadRescueBtn){
        loadRescueBtn.addEventListener("click", ()=>{
            const data = getRescueSnapshot();
            if(data && data.state){
                applyState(data.state);
                clearRescueSnapshot();
                setDirty(false);
                refreshDraftUI();
            }
        });
    }
    if(discardRescueBtn){
        discardRescueBtn.addEventListener("click", ()=>{
            clearRescueSnapshot();
            refreshDraftUI();
        });
    }

    // Modal save controls
    const createSaveBtn = document.getElementById("create-save-btn");
    const saveNameInput = document.getElementById("save-name-input");
    if(createSaveBtn) createSaveBtn.addEventListener("click", ()=>{
        createSave(saveNameInput ? saveNameInput.value : "");
        if(saveNameInput) saveNameInput.value = "";
    });

    // Firebase Auth 登入 / 登出按鈕事件
    const loginBtn = document.getElementById("login-btn");
    const logoutBtn = document.getElementById("logout-btn");
    if(loginBtn){
        loginBtn.addEventListener("click", () => {
            signInWithGoogle();
        });
    }
    if(logoutBtn){
        logoutBtn.addEventListener("click", () => {
            signOutUser();
        });
    }

    // 初次載入：渲染存檔列表 + 檢查是否有救援暫存
    renderSaveList();
    refreshDraftUI();


    // 自動同步 iOS OS 版本到 Safari 欄位
    document.getElementById("ios-os").addEventListener("input", () => {
        const os = document.getElementById("ios-os").value.trim();
        document.getElementById("ios-safari-version").value = os;
    });

    // 記憶欄位
    setupMemoryField("tester","tester");
    setupMemoryField("android-model","android_model");
    setupMemoryField("ios-model","ios_model");

    // 站別初始渲染
    renderSelectedSites();
    renderSiteConfigBlocks();

    // 控制 iOS 子欄位顯示
    const syncIosBlock = () => {
        const ios = document.getElementById("ios-check").checked;
        document.getElementById("ios-browser-wrapper").style.display = ios ? "flex" : "none";
    };
    syncIosBlock();
    document.querySelectorAll(".device-check").forEach(chk=>{
        chk.addEventListener("change",()=>{
            syncIosBlock();
            updateFullPreview();
        });
    });

    // iOS 子瀏覽器更新
    document.querySelectorAll(".ios-browser").forEach(chk=>{
        chk.addEventListener("change",updateFullPreview);
    });

    // 基本欄位
    [
        "incident_date","tester","order_id",
        "problem-desc",
        "operation_editor","actual_editor","expected_editor","remark_editor"
    ].forEach(id=>{
        const el = document.getElementById(id);
        if(el) el.addEventListener("input", ()=>{
            if(id === "problem-desc") updateTitle();
            updateFullPreview();
        });
    });

    // 裝置欄位
    [
        "pc-browser",
        "android-model","android-os","android-browser",
        "ios-os","ios-model",
        "ios-safari-version","ios-chrome-version",
        "ios-other-name","ios-other-version"
    ].forEach(id=>{
        const el=document.getElementById(id);
        if(el) el.addEventListener("input",updateFullPreview);
    });

    updateTitle();
    updateFullPreview();
});
</script>

      // 只在真的被省略時才加 title（方便查看完整文字）
      if (el.scrollWidth > el.clientWidth) {
        el.setAttribute('title', (el.textContent || '').trim());
      }
    });
  }
  window.addEventListener('load', function(){
    requestAnimationFrame(applyBugTableTooltips);
  });
  window.addEventListener('resize', function(){
    requestAnimationFrame(applyBugTableTooltips);
  });
})();
</script>
